.tt{font-size:2.4em;font-weight:800;letter-spacing:1px;margin-bottom:15px;background:linear-gradient(135deg,#fff,var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc{width:100%;margin:5px auto 25px;display:flex;justify-content:center;background:#000;border-radius:12px;overflow:hidden}
.si{width:100%;max-width:320px;height:auto;display:block;mix-blend-mode:screen}

.wc{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#ts{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--p);color:#000;padding:10px 22px;border-radius:30px;font-weight:bold;transition:0.4s;z-index:100}
#ts.s{transform:translateX(-50%) translateY(0)}
@media (max-width:600px){.cd{padding:30px 20px}.wc{grid-template-columns:1fr}}
