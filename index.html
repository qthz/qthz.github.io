<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qthzZ - 个人主页</title>
    <style>
        :root {
            --primary-color: #38bdf8;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', "Microsoft YaHei", sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            color: #f8fafc;
        }

        /* 背景层 */
        .bg-layer {
            position: absolute;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background-size: cover;
            background-position: center;
            filter: blur(5px) brightness(0.6);
            z-index: 1;
            transition: transform 0.1s ease-out;
            background-image: url('https://img.cdn1.vip/i/69c28b425cfe7_1774357314.webp');
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        /* 气泡粒子 */
        .bubbles {
            position: absolute; width: 100%; height: 100%; z-index: 3; pointer-events: none;
        }
        .bubble {
            position: absolute; bottom: -20px;
            background: rgba(255, 255, 255, 0.1); border-radius: 50%;
            animation: rise infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* 主体容器与卡片 */
        .container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            height: 100%; padding: 20px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%; max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 文本信息 */
        .greeting { font-size: 1em; color: #94a3b8; margin-bottom: 5px; font-weight: 300; }
        #clock { font-family: monospace; font-size: 0.85em; color: #64748b; margin-bottom: 15px; letter-spacing: 1px; }
        
        .title {
            font-size: 2.6em; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--primary-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        /* 手写签名 SVG 区域 */
        .signature-container {
            width: 100%;
            height: 80px; /* 固定高度防止页面跳动 */
            margin: 10px auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signature-svg {
            width: 80%; /* 保证手机端不会太大 */
            max-width: 250px;
            height: auto;
            overflow: visible;
        }

        .signature-path {
            stroke: #fff;
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); /* 增加发光效果 */
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
        }

        /* 动画类：由JS触发，速度1.8s */
        .signature-path.draw {
            animation: drawLine 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* 链接列表 */
        .links-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .link-card {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 20px; border-radius: 16px; text-decoration: none; color: #e2e8f0;
            transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden;
        }
        .link-card:hover {
            transform: translateY(-2px); background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        .link-left { display: flex; align-items: center; gap: 15px; font-size: 1.05em; font-weight: 500; }
        .link-icon { font-size: 1.3em; }
        .link-hint { font-size: 0.75em; color: #94a3b8; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 10px; }
        .wechat-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Toast 提示 */
        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(56, 189, 248, 0.95); color: #000; padding: 12px 24px;
            border-radius: 30px; font-weight: bold; box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
            opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 100; pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @keyframes slideUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        @media (max-width: 600px) {
            .card { padding: 30px 20px; }
            .wechat-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-layer" id="bgLayer"></div>
    <div class="overlay"></div>
    <div class="bubbles" id="bubbles"></div>

    <div class="container">
        <div class="card">
            <div class="greeting" id="greeting">你好！</div>
            <div id="clock">00:00:00</div>
            <h1 class="title">qthzZ</h1>

            <div class="signature-container">
                <svg class="signature-svg" viewBox="0 0 380 160">
                    <path class="signature-path" id="signaturePath" d="
                        M 40 100 C 20 100, 30 40, 60 40 C 80 40, 60 110, 50 130 C 40 150, 80 140, 90 110 
                        L 100 140 L 115 110 L 125 140 L 140 110 
                        L 150 140 L 160 110 L 170 140 L 180 110 L 190 140 L 200 110 
                        L 210 140 L 220 110 L 220 140 
                        M 220 130 L 260 60 L 250 140 
                        M 240 100 L 300 85 
                        M 315 85 A 15 15 0 0 1 335 75 A 15 15 0 0 1 355 85 Q 355 105 335 125 Q 315 105 315 85 Z
                    " />
                </svg>
            </div>

            <div class="links-grid">
                <a href="https://x.com/qthzZ" target="_blank" class="link-card">
                    <div class="link-left"><span class="link-icon">𝕏</span><span>@qthzZ</span></div>
                    <span class="link-hint">前往</span>
                </a>
                <a href="https://qm.qq.com/q/IA2WDQcPG8" target="_blank" class="link-card">
                    <div class="link-left"><span class="link-icon">🐧</span><span>我的 QQ</span></div>
                    <span class="link-hint">添加</span>
                </a>
                <div class="link-card" onclick="copyText('qthzawa@gmail.com', '邮箱')">
                    <div class="link-left"><span class="link-icon">✉️</span><span>qthzawa@gmail.com</span></div>
                    <span class="link-hint">复制</span>
                </div>
                <div class="wechat-container">
                    <div class="link-card" onclick="copyText('Toeddesert1170', '微信1')">
                        <div class="link-left"><span class="link-icon">💬</span><span style="font-size: 0.85em;">Toeddesert1170</span></div>
                        <span class="link-hint">复制</span>
                    </div>
                    <div class="link-card" onclick="copyText('LXQTHZ', '微信2')">
                        <div class="link-left"><span class="link-icon">💬</span><span>LXQTHZ</span></div>
                        <span class="link-hint">复制</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">复制成功！</div>

    <script>
        // 背景备用切换
        const bgLayer = document.getElementById('bgLayer');
        const img = new Image();
        img.src = 'https://img.cdn1.vip/i/69c28b425cfe7_1774357314.webp';
        img.onerror = () => bgLayer.style.backgroundImage = "url('https://picui.ogmua.cn/s1/2026/03/24/69c28b3483ac0.webp')";

        // 视差效果 (手机上基本不触发，电脑上有效)
        document.addEventListener('mousemove', e => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            bgLayer.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });

        // 气泡
        const bubblesContainer = document.getElementById('bubbles');
        for (let i = 0; i < 15; i++) {
            let b = document.createElement('div');
            b.className = 'bubble';
            let s = Math.random() * 20 + 5;
            b.style.width = s + 'px';
            b.style.height = s + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = (Math.random() * 5 + 5) + 's';
            b.style.animationDelay = Math.random() * 5 + 's';
            bubblesContainer.appendChild(b);
        }

        // 时钟
        function updateTime() {
            const n = new Date();
            const h = String(n.getHours()).padStart(2, '0');
            const m = String(n.getMinutes()).padStart(2, '0');
            const s = String(n.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
            let g = '你好！';
            if (n.getHours() < 6) g = '夜深了，注意休息 🌙';
            else if (n.getHours() < 12) g = '早上好，新的一天 ☀️';
            else if (n.getHours() < 18) g = '下午好 ☕';
            else g = '晚上好 🌟';
            document.getElementById('greeting').innerText = g;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 精确计算 SVG 长度并触发快速绘制动画
        window.onload = () => {
            const path = document.getElementById('signaturePath');
            if (path) {
                const length = path.getTotalLength();
                // 动态设置线条长度
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
                // 延迟 0.3 秒后开始急速绘制
                setTimeout(() => {
                    path.classList.add('draw');
                }, 300);
            }
        };

        // 复制功能
        let toastTimeout;
        function copyText(text, name) {
            const i = document.createElement("input");
            i.value = text;
            document.body.appendChild(i);
            i.select();
            document.execCommand("copy");
            document.body.removeChild(i);
            
            const toast = document.getElementById('toast');
            toast.innerText = `${name} 已复制: ${text}`;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
